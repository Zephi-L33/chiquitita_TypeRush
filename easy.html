<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>TypeRush</title>
    <link rel="stylesheet" href="easy.css">
    <link rel="icon" type="png" sizes="64x64" href="Type (1).png">

</head>

<body>
    <div class="homeScreen"></div>
    <div id="game">

        <div id="background"></div>

        <div id="content">
            <p id="greetings"></p>
            <h1>TYPERUSH</h1>

            <p id="lore"></p>

            <div id="text"></div>

            <input class="sentencehere" id="input" type="text" placeholder="Start typing here..." />


            <div id="stats">
                <p>Score: <span id="score">0</span></p>
                <p>Time: <span id="time">0</span>s</p>
                <p>Streak: <span id="streak">0</span></p>
            </div>

            <button class="start" onclick="startGame()"></button>
            <button class="backtohomepage" onclick="goBack()"></button>

        </div>
    </div>
    <script src="easy.js"></script>
</body>

</html>
